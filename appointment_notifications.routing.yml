appointment_notifications.settings_form:
  path: '/admin/config/services/appointment-notifications'
  defaults:
    _form: '\Drupal\appointment_notifications\Form\AppointmentNotificationsSettingsForm'
    _title: 'Appointment Notifications Settings'
  requirements:
    _permission: 'administer site configuration'

appointment_notifications.feedback_form:
  path: '/appointment/{node}/feedback'
  defaults:
    _form: '\Drupal\appointment_notifications\Form\AppointmentFeedbackForm'
    _title: 'Appointment Feedback'
  requirements:
    _permission: 'access content'

appointment_notifications.cancel_by_link:
  path: '/appointment/{node}/cancel/{audience}/{expires}/{token}'
  defaults:
    _form: '\Drupal\appointment_notifications\Form\CancelAppointmentByLinkForm'
    _title: 'Cancel Appointment'
  requirements:
    _custom_access: '\Drupal\appointment_notifications\Access\CancelAppointmentLinkAccess::access'
  options:
    parameters:
      node:
        type: entity:node
